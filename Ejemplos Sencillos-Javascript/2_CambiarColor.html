<!DOCTYPE html>
<!-- Cambiar el color de fondo de un elemento 
 CAMBIANDO ESTILOS EN LINEA-->
    <head>
        <style>
            #color{background-color: aqua;width: 50%;height: 150px;}
        </style>
    </head>
    <body>
         <div id="color"> </div>
         <button onclick="cambiarColor()">Cambiará Color</button>

         <script >
            function cambiarColor(){
                if(document.getElementById("color").style.backgroundColor=="red")
                    document.getElementById("color").style.backgroundColor="aqua";
                else
                    document.getElementById("color").style.backgroundColor="red";
                

            }
         </script>
    </body>
</html>
