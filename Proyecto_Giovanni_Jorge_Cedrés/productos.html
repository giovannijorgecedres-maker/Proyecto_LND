<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos de CR7</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <header>
        <img src="img/logo.png" alt="Logotipo CR7" class="logo">
        <h1>Tienda Oficial</h1>
        <nav>
            <ul>
                <li><a href="inicial.html">Inicio</a></li>
                <li><a href="logros.html">Logros</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="carrusel.html">Carrusel</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Catálogo de Merchandising</h2>
            <div class="productos">
                <div class="producto">
                    <img src="img/NDBH0217.jpg" alt="Camiseta CR7">
                    <p>Camiseta Oficial</p>
                    <button onclick="añadirAlCarrito('Camiseta')">Añadir al carrito</button>
                </div>
                <div class="producto">
                    <img src="img/618JCuKkzfL.jpg" alt="Balón CR7">
                    <p>Balón de Oro Réplica</p>
                    <button onclick="añadirAlCarrito('Balon')">Añadir al carrito</button>
                </div>
                 <div class="producto">
                    <img src="img/ur,throw_pillow_couch_small,square,600x600.jpg" alt="Balón CR7">
                    <p>Almohada de Cr7</p>
                    <button onclick="añadirAlCarrito('Almohada')">Añadir al carrito</button>
                </div>
                <div class="producto">
                    <img src="img/f025adecd894421d5e89be3c2677f8f0.avif" alt="Calzoncillos de CR7">
                    <p>Calzoncillos de Cr7</p>
                    <button onclick="añadirAlCarrito('Calzones')">Añadir al carrito</button>
                </div>
            </div>
            <h3>Tu Carrito</h3>
            <ul id="carrito"></ul>
        </section>
    </main>

    <footer>
        <p>© 2025 Fan Page de Cristiano Ronaldo</p>
    </footer>

    
    <script>
        function añadirAlCarrito(producto) {
            const lista = document.getElementById('carrito');
            const item = document.createElement('li');
            item.textContent = producto;
            lista.appendChild(item);
        }
    </script>

</body>
</html>
