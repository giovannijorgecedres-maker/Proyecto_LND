<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Fan Page CR7</title>
    <link rel="icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <header>
        <img src="img/logo.png" alt="Logotipo CR7" class="logo">
        <h1>Ponte en Contacto</h1>
        <nav>
            <ul>
                <li><a href="inicial.html">Inicio</a></li>
                <li><a href="logros.html">Logros</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Contenedor para dos columnas según las fuentes-->
        <section class="contenedor-contacto">
            <article class="columna">
                <h3>Formulario de Contacto</h3>
                <form action="#">
                    <input type="text" placeholder="Nombre completo" required> 
                    <input type="email" placeholder="Tu Correo" required> 
                    <select name="motivo"> 
                        <option value="info">Información General</option>
                        <option value="tienda">Soporte Tienda</option>
                    </select>
                    <label>
                        <input type="checkbox" required> Acepto la política de privacidad 
                    </label>
                    <button type="submit">Enviar Mensaje</button> 
                </form>
            </article>
            
        </section>
    </main>

    <footer>
        <p>© 2026 Fan Page de Cristiano Ronaldo</p>
    </footer>
</body>
</html>
