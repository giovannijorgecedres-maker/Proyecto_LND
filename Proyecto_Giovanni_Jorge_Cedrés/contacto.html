<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Fan Page CR7</title>
    <link rel="icon" href="img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <!--cambiar esta parte, añadir div para cada apartado del header para que quede en línea-->
    <header>
        <img src="img/logo.png" alt="Logotipo CR7" class="logo">
        <h1>Ponte en Contacto</h1>
        <nav>
            <ul>
                <li><a href="inicial.html">Inicio</a></li>
                <li><a href="logros.html">Logros</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Contenedor para dos columnas según las fuentes-->
        <section class="contenedor-contacto">
            <article class="columna">
                <h3>Formulario de Contacto</h3>
                <form action="#">
                    <input type="text" placeholder="Nombre completo" required>
                    <input type="email" placeholder="Tu Correo" required>
                    <select name="motivo">
                        <option value="info">Información General</option>
                        <option value="tienda">Soporte Tienda</option>
                        <option value="productos">Propuesta de Producto</option>
                        <option value="error de venta">Incidencia con un producto</option>
                    </select>
                    <label>
                        <input type="checkbox" required> Acepto la política de privacidad
                    </label>
                    <button type="submit">Enviar Mensaje</button>
                </form>
            </article>

            <aside class="columna">
                <h3>Lugar donde Cristiano Ronaldo se convirtió para los Madridistas y amantes del fútbol en el GOAT</h3>
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3036.0042784824367!2d-3.690949684603417!3d40.45301957936081!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd4228e23705d39f%3A0xa8fff6d26e2b1988!2sEstadio%20Santiago%20Bernab%C3%A9u!5e0!3m2!1ses!2ses!4v1707750000000!5m2!1ses!2ses"
                    width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </aside>

        </section>
    </main>

    <footer>
        <p>© 2026 Fan Page de Cristiano Ronaldo</p>
    </footer>
</body>

</html>
